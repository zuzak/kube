apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-lifestyle
  namespace: lifestyle
---
# The prometheus-operator creates this RBAC for kube-prometheus automatically,
# but not for standalone Prometheus CRs in non-monitoring namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-lifestyle
rules:
  - apiGroups: [""]
    resources: [services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-lifestyle
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-lifestyle
subjects:
  - kind: ServiceAccount
    name: prometheus-lifestyle
    namespace: lifestyle
---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: lifestyle
  namespace: lifestyle
spec:
  replicas: 1
  serviceAccountName: prometheus-lifestyle
  securityContext:
    fsGroup: 65534
    runAsUser: 65534
    runAsNonRoot: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  retention: 90d
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn-durable
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  # Scrape only ServiceMonitors explicitly opted in with prometheus: lifestyle.
  # serviceMonitorNamespaceSelector: {} matches all namespaces so targets in
  # claude-grocy (and future lifestyle namespaces) are discovered automatically.
  serviceMonitorSelector:
    matchLabels:
      prometheus: lifestyle
  serviceMonitorNamespaceSelector: {}
  podMonitorSelector:
    matchLabels:
      prometheus: lifestyle
  podMonitorNamespaceSelector:
    matchLabels:
      prometheus: lifestyle
  ruleSelector:
    matchLabels:
      prometheus: lifestyle
  ruleNamespaceSelector:
    matchLabels:
      prometheus: lifestyle
  priorityClassName: cluster-low
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-lifestyle
  namespace: lifestyle
spec:
  type: ClusterIP
  selector:
    prometheus: lifestyle
  ports:
    - name: web
      port: 9090
      targetPort: 9090
---
# Grafana datasource: sidecar watches ConfigMaps labelled grafana_datasource=1 cluster-wide.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-lifestyle-prometheus
  namespace: lifestyle
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Lifestyle Prometheus
        uid: lifestyle-prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-lifestyle.lifestyle.svc.cluster.local:9090
        isDefault: false
        jsonData:
          timeInterval: 30s
