apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude
  namespace: claude
---
# Long-lived token for Claude's kubeconfig.
# k8s 1.24+ no longer auto-creates SA tokens; this Secret causes the
# token controller to populate .data.token.
apiVersion: v1
kind: Secret
metadata:
  name: claude-token
  namespace: claude
  annotations:
    kubernetes.io/service-account.name: claude
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude
rules:
  # Read everything cluster-wide, including Secrets
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Read non-resource URLs (e.g. /healthz, /metrics)
  - nonResourceURLs: ["*"]
    verbs: ["get"]
  # Write Secrets — for operational credential management (rotation,
  # bootstrapping) that should not be committed to git
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "delete"]
  # Pod exec and port-forward for live debugging
  - apiGroups: [""]
    resources: ["pods/exec", "pods/portforward"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
