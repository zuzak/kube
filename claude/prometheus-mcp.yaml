apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-mcp
  namespace: claude
  labels:
    app: prometheus-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-mcp
  template:
    metadata:
      labels:
        app: prometheus-mcp
    spec:
      containers:
        - name: prometheus-mcp
          image: ghcr.io/pab1it0/prometheus-mcp-server:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
            - name: PROMETHEUS_MCP_SERVER_TRANSPORT
              value: sse
            - name: PROMETHEUS_MCP_BIND_HOST
              value: "0.0.0.0"
            - name: PROMETHEUS_MCP_BIND_PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-mcp
  namespace: claude
spec:
  selector:
    app: prometheus-mcp
  ports:
    - port: 8080
      targetPort: 8080
      name: http
