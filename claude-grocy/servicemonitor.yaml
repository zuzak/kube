apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: claude-grocy
  namespace: claude-grocy
  labels:
    prometheus: lifestyle
spec:
  namespaceSelector:
    matchNames:
      - claude-grocy
  selector:
    matchLabels:
      app: claude-grocy
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
