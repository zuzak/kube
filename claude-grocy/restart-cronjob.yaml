apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-grocy-restarter
  namespace: claude-grocy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-grocy-restarter
  namespace: claude-grocy
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-grocy-restarter
  namespace: claude-grocy
subjects:
  - kind: ServiceAccount
    name: claude-grocy-restarter
    namespace: claude-grocy
roleRef:
  kind: Role
  name: claude-grocy-restarter
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude-grocy-restart
  namespace: claude-grocy
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: claude-grocy-restarter
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.32
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  kubectl rollout restart deployment/claude-grocy -n claude-grocy
                  kubectl rollout status deployment/claude-grocy -n claude-grocy --timeout=120s
