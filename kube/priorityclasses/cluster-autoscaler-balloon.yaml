apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: cluster-autoscaler-balloon
value: -10
globalDefault: false
preemptionPolicy: Never
description: >-
  Sub-zero priority for overprovisioning balloon pods. These hold unused
  capacity on autoscaled nodes and are evicted immediately when a real
  workload needs the space, causing the balloon to go Pending and trigger
  another scale-out.
