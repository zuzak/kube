apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    kubernetes.io/description: |
      Grafana Loki in monolithic SingleBinary mode. Pinned to the Pi via
      nodeSelector; PVC on the `longhorn` storage class. The PVC size (not a
      time-based limit) is the real retention cap — the 90-day retention
      ceiling is set high on purpose so ingest stalls rather than silently
      dropping old chunks if throughput ever spikes. PrometheusRule alerts
      (logging-alerts) surface disk headroom and ingest health.
spec:
  project: logging
  destination:
    server: https://kubernetes.default.svc
    namespace: loki
  source:
    repoURL: https://github.com/grafana/loki.git
    path: production/helm/loki
    targetRevision: HEAD
    helm:
      valuesObject:
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          storage:
            type: filesystem
          limits_config:
            retention_period: 2160h
            reject_old_samples: true
            reject_old_samples_max_age: 168h
            ingestion_rate_mb: 10
            ingestion_burst_size_mb: 20
            max_streams_per_user: 0
            max_global_streams_per_user: 5000
          compactor:
            retention_enabled: true
            delete_request_store: filesystem
            working_directory: /var/loki/retention
          query_scheduler:
            max_outstanding_requests_per_tenant: 32768
          ruler:
            enable_api: false
          analytics:
            reporting_enabled: false
        singleBinary:
          replicas: 1
          priorityClassName: cluster-low
          nodeSelector:
            kubernetes.io/hostname: pi.home.arpa
          persistence:
            enabled: true
            storageClass: longhorn
            size: 30Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          extraArgs:
            - "-config.expand-env=true"
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        gateway:
          enabled: false
        lokiCanary:
          enabled: false
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        test:
          enabled: false
        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false
          dashboards:
            enabled: false
          rules:
            enabled: false
          serviceMonitor:
            enabled: true
            labels:
              release: prometheus
        minio:
          enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
