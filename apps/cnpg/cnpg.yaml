---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg
spec:
  destination:
    namespace: cnpg
    server: https://kubernetes.default.svc
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: v0.27.*
    helm:
      valuesObject:
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - pi.home.arpa
        tolerations:
          - key: node-role
            operator: Equal
            value: edge
            effect: NoSchedule
  project: cnpg
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
