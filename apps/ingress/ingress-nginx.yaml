apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: ingress
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.13.*
    chart: ingress-nginx
    helm:
      values: |
        controller:
          kind: DaemonSet
          priorityClassName: cluster-critical
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          service:
            externalTrafficPolicy: Cluster
          config:
            log-format-upstream: '{"time":"$time_iso8601","remote_addr":"$remote_addr","x_forwarded_for":"$proxy_add_x_forwarded_for","request_id":"$req_id","status":$status,"method":"$request_method","path":"$uri","query":"$args","host":"$host","proto":"$server_protocol","bytes_sent":$bytes_sent,"request_time":$request_time,"upstream_response_time":"$upstream_response_time","http_referrer":"$http_referer","http_user_agent":"$http_user_agent"}'
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
