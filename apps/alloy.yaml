apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: |
      Grafana Alloy collecting pod logs cluster-wide as a DaemonSet and
      shipping them to Loki. Tails files from /var/log/pods via hostPath;
      relabels K8s metadata onto each stream. Also receives Claude Code
      OTLP telemetry on hostPort 4317 (Pi only) and forwards metrics to
      the claude-namespace Prometheus and logs to Loki. No ingress.
spec:
  project: logging
  destination:
    server: https://kubernetes.default.svc
    namespace: alloy
  source:
    repoURL: https://github.com/grafana/alloy.git
    path: operations/helm/charts/alloy
    targetRevision: HEAD
    helm:
      valuesObject:
        controller:
          type: daemonset
          priorityClassName: cluster-low
        alloy:
          clustering:
            enabled: false
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              hostPort: 4317
              protocol: TCP
          mounts:
            varlog: true
            dockercontainers: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          configMap:
            create: true
            content: |
              logging {
                level  = "info"
                format = "logfmt"
              }

              discovery.kubernetes "pods" {
                role = "pod"
              }

              discovery.relabel "pods" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  target_label  = "app"
                }
                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
                  separator     = "/"
                  target_label  = "job"
                }
                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
                  separator     = "/"
                  target_label  = "__path__"
                  replacement   = "/var/log/pods/*$1/*.log"
                }
              }

              local.file_match "pods" {
                path_targets = discovery.relabel.pods.output
              }

              loki.source.file "pods" {
                targets    = local.file_match.pods.targets
                forward_to = [loki.process.cri.receiver]
              }

              loki.process "cri" {
                stage.cri {}

                // klog format: lines begin with I/W/E/F followed by MMDD timestamp.
                // Map to canonical level names so Grafana colours them correctly.
                stage.regex {
                  expression = `^(?P<level>[IWEF])\d{4} `
                }
                stage.template {
                  source   = "level"
                  template = `{{ if eq .Value "I" }}info{{ else if eq .Value "W" }}warn{{ else if eq .Value "E" }}error{{ else if eq .Value "F" }}critical{{ end }}`
                }
                stage.labels {
                  values = {
                    level = "level",
                  }
                }

                forward_to = [loki.write.local.receiver]
              }

              loki.write "local" {
                endpoint {
                  url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
                }
              }

              // Claude Code OTLP telemetry (hostPort 4317 on Pi)
              // Requires CLAUDE_CODE_ENABLE_TELEMETRY=1 and OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
              // on the Pi host. See zuzak/.claude#408 for full env var set.
              otelcol.receiver.otlp "claude_code" {
                grpc { endpoint = "0.0.0.0:4317" }
                output {
                  logs    = [otelcol.exporter.loki.claude_code.input]
                  metrics = [otelcol.exporter.prometheus.claude_code.input]
                }
              }

              otelcol.exporter.loki "claude_code" {
                forward_to = [loki.write.local.receiver]
              }

              otelcol.exporter.prometheus "claude_code" {
                forward_to = [prometheus.remote_write.claude.receiver]
              }

              prometheus.remote_write "claude" {
                endpoint {
                  url = "http://prometheus-claude.claude.svc.cluster.local:9090/api/v1/write"
                }
              }
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: prometheus
        rbac:
          create: true
        serviceAccount:
          create: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
