apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: |
      Grafana Alloy collecting pod logs cluster-wide as a DaemonSet and
      shipping them to Loki. Tails files from /var/log/pods via hostPath;
      relabels K8s metadata onto each stream. Also ingests Claude Code
      JSONL transcripts from /home/claude/.claude/projects/ with type-based
      label extraction. No ingress.
spec:
  project: logging
  destination:
    server: https://kubernetes.default.svc
    namespace: alloy
  source:
    repoURL: https://github.com/grafana/alloy.git
    path: operations/helm/charts/alloy
    targetRevision: HEAD
    helm:
      valuesObject:
        controller:
          type: daemonset
          priorityClassName: cluster-low
          volumes:
            extra:
              - name: home-claude
                hostPath:
                  path: /home/claude/.claude/projects
                  type: Directory
        alloy:
          clustering:
            enabled: false
          mounts:
            varlog: true
            dockercontainers: true
            extra:
              - name: home-claude
                mountPath: /home/claude/.claude/projects
                readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          configMap:
            create: true
            content: |
              logging {
                level  = "info"
                format = "logfmt"
              }

              discovery.kubernetes "pods" {
                role = "pod"
              }

              discovery.relabel "pods" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  target_label  = "app"
                }
                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
                  separator     = "/"
                  target_label  = "job"
                }
                rule {
                  action        = "replace"
                  source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
                  separator     = "/"
                  target_label  = "__path__"
                  replacement   = "/var/log/pods/*$1/*.log"
                }
              }

              local.file_match "pods" {
                path_targets = discovery.relabel.pods.output
              }

              loki.source.file "pods" {
                targets    = local.file_match.pods.targets
                forward_to = [loki.process.cri.receiver]
              }

              loki.process "cri" {
                stage.cri {}

                // klog format: lines begin with I/W/E/F followed by MMDD timestamp.
                // Map to canonical level names so Grafana colours them correctly.
                stage.regex {
                  expression = `^(?P<level>[IWEF])\d{4} `
                }
                stage.template {
                  source   = "level"
                  template = `{{ if eq .Value "I" }}info{{ else if eq .Value "W" }}warn{{ else if eq .Value "E" }}error{{ else if eq .Value "F" }}critical{{ end }}`
                }
                stage.labels {
                  values = {
                    level = "level",
                  }
                }

                forward_to = [loki.write.local.receiver]
              }

              // --- Claude Code JSONL transcript ingestion ---

              local.file_match "claude_transcripts" {
                path_targets = [{
                  __path__ = "/home/claude/.claude/projects/**/*.jsonl",
                  job      = "claude-transcripts",
                }]
              }

              loki.source.file "claude_transcripts" {
                targets    = local.file_match.claude_transcripts.targets
                forward_to = [loki.relabel.claude_transcripts.receiver]
              }

              // Extract session UUID from the filename; all JSONL files are named <uuid>.jsonl
              loki.relabel "claude_transcripts" {
                forward_to = [loki.process.claude_transcripts.receiver]

                rule {
                  source_labels = ["filename"]
                  regex         = `.*/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\.jsonl$`
                  target_label  = "session_id"
                  replacement   = "$1"
                }
              }

              loki.process "claude_transcripts" {
                // Extract type first so the drop stage can filter on it
                stage.json {
                  expressions = {
                    entry_type = "type",
                    version    = "version",
                  }
                }

                // Drop high-volume / low-signal entry types
                stage.drop {
                  source     = "entry_type"
                  expression = "^(user|last-prompt|attachment|file-history-snapshot)$"
                }

                // Promote common fields to labels
                stage.labels {
                  values = {
                    type    = "entry_type",
                    version = "",
                  }
                }

                // assistant entries: model, stop reason, and error metadata
                stage.match {
                  selector = `{type="assistant"}`

                  stage.json {
                    expressions = {
                      model        = "message.model",
                      stop_reason  = "message.stop_reason",
                      is_api_error = "isApiErrorMessage",
                      error        = "error",
                    }
                  }
                  stage.labels {
                    values = {
                      model        = "",
                      stop_reason  = "",
                      is_api_error = "",
                      error        = "",
                    }
                  }
                }

                // permission-mode entries
                stage.match {
                  selector = `{type="permission-mode"}`

                  stage.json {
                    expressions = {
                      permission_mode = "permission_mode",
                    }
                  }
                  stage.labels {
                    values = {
                      permission_mode = "",
                    }
                  }
                }

                // pr-link entries (JSON field is camelCase prUrl)
                stage.match {
                  selector = `{type="pr-link"}`

                  stage.json {
                    expressions = {
                      pr_url = "prUrl",
                    }
                  }
                  stage.labels {
                    values = {
                      pr_url = "",
                    }
                  }
                }

                // agent-name entries (JSON field is camelCase agentName)
                stage.match {
                  selector = `{type="agent-name"}`

                  stage.json {
                    expressions = {
                      agent_name = "agentName",
                    }
                  }
                  stage.labels {
                    values = {
                      agent_name = "",
                    }
                  }
                }

                // queue-operation entries (JSON field is "operation", no queue_size in practice)
                stage.match {
                  selector = `{type="queue-operation"}`

                  stage.json {
                    expressions = {
                      operation = "operation",
                    }
                  }
                  stage.labels {
                    values = {
                      operation = "",
                    }
                  }
                }

                // custom-title entries (JSON field is camelCase customTitle)
                stage.match {
                  selector = `{type="custom-title"}`

                  stage.json {
                    expressions = {
                      title = "customTitle",
                    }
                  }
                  stage.labels {
                    values = {
                      title = "",
                    }
                  }
                }

                forward_to = [loki.write.local.receiver]
              }

              loki.write "local" {
                endpoint {
                  url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
                }
              }
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: prometheus
        rbac:
          create: true
        serviceAccount:
          create: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
