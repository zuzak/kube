apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-otlp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: |
      Grafana Alloy on the Pi receiving OTLP telemetry from Claude Code and
      forwarding metrics to the claude-namespace Prometheus via remote_write.
      Also ingests Claude Code JSONL transcripts from /home/claude/.claude/projects/
      into Loki with type-based label extraction. Deployed as a single-replica
      Deployment pinned to the Pi (hostPort 4317 is safe there; saraneth has no
      Claude Code processes). Separate from the cluster-wide log-collection Alloy
      DaemonSet.
spec:
  project: claude
  destination:
    server: https://kubernetes.default.svc
    namespace: claude
  source:
    repoURL: https://github.com/grafana/alloy.git
    path: operations/helm/charts/alloy
    targetRevision: HEAD
    helm:
      valuesObject:
        crds:
          create: false
        controller:
          type: deployment
          replicas: 1
          strategy:
            type: Recreate
          priorityClassName: cluster-low
          nodeSelector:
            kubernetes.io/hostname: pi.home.arpa
          volumes:
            extra:
              - name: home-claude
                hostPath:
                  path: /home/claude/.claude/projects
                  type: Directory
              - name: alloy-storage
                hostPath:
                  path: /home/claude/.alloy-storage
                  type: DirectoryOrCreate
        alloy:
          clustering:
            enabled: false
          extraEnv:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              hostPort: 4317
              protocol: TCP
          mounts:
            extra:
              - name: home-claude
                mountPath: /home/claude/.claude/projects
                readOnly: true
              - name: alloy-storage
                mountPath: /tmp/alloy
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          configMap:
            create: true
            content: |
              logging {
                level  = "info"
                format = "logfmt"
              }

              otelcol.receiver.otlp "claude" {
                grpc {
                  endpoint = "0.0.0.0:4317"
                }
                output {
                  metrics = [otelcol.processor.transform.claude_descriptions.input]
                }
              }

              otelcol.processor.transform "claude_descriptions" {
                metric_statements {
                  context = "metric"
                  statements = [
                    `set(description, "Count of CLI sessions started") where name == "claude_code.session.count"`,
                    `set(description, "Count of lines of code modified; 'type' attribute is 'added' or 'removed'") where name == "claude_code.lines_of_code.count"`,
                    `set(description, "Number of pull requests created") where name == "claude_code.pull_request.count"`,
                    `set(description, "Number of git commits created") where name == "claude_code.commit.count"`,
                    `set(description, "Cost of the Claude Code session in USD") where name == "claude_code.cost.usage"`,
                    `set(description, "Number of tokens used") where name == "claude_code.token.usage"`,
                    `set(description, "Count of Edit/Write/NotebookEdit tool permission decisions; 'decision' attribute is 'accept' or 'reject'") where name == "claude_code.code_edit_tool.decision"`,
                    `set(description, "Total active time in seconds") where name == "claude_code.active_time.total"`,
                  ]
                }
                output {
                  metrics = [otelcol.exporter.prometheus.claude.input]
                }
              }

              otelcol.exporter.prometheus "claude" {
                forward_to = [prometheus.remote_write.claude.receiver]
              }

              prometheus.remote_write "claude" {
                endpoint {
                  url = "http://prometheus-claude.claude.svc.cluster.local:9090/api/v1/write"
                }
              }

              // Scrape the live-session exporter (claude-prometheus-exporter systemd user service,
              // port 9091 on the Pi). Routes to the same Claude Prometheus as OTLP metrics.
              prometheus.scrape "claude_live" {
                targets = [{
                  __address__ = env("NODE_IP") + ":9091",
                  job         = "claude-live",
                }]
                scrape_interval = "10s"
                forward_to      = [prometheus.remote_write.claude.receiver]
              }

              // --- Claude Code JSONL transcript ingestion ---

              local.file_match "claude_transcripts" {
                path_targets = [{
                  __path__ = "/home/claude/.claude/projects/**/*.jsonl",
                  job      = "claude-transcripts",
                }]
              }

              loki.source.file "claude_transcripts" {
                targets    = local.file_match.claude_transcripts.targets
                forward_to = [loki.relabel.claude_transcripts.receiver]
              }

              // Extract session UUID. Two path patterns:
              // - Normal sessions: <uuid>.jsonl (UUID is the filename)
              // - Subagent transcripts: <parent-uuid>/subagents/agent-<hex>.jsonl (UUID is the directory)
              // The subagent rule must come first; it matches the longer path before the plain UUID rule.
              loki.relabel "claude_transcripts" {
                forward_to = [loki.process.claude_transcripts.receiver]

                rule {
                  source_labels = ["filename"]
                  regex         = `.*/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})/subagents/.*\.jsonl$`
                  target_label  = "session_id"
                  replacement   = "$1"
                }

                rule {
                  source_labels = ["filename"]
                  regex         = `.*/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\.jsonl$`
                  target_label  = "session_id"
                  replacement   = "$1"
                }
              }

              loki.process "claude_transcripts" {
                // Extract type, version, and actual entry timestamp
                stage.json {
                  expressions = {
                    entry_type = "type",
                    version    = "version",
                    entry_ts   = "timestamp",
                  }
                }

                // Use the entry's own timestamp rather than ingestion time;
                // prevents all history appearing at pod-start time on restart
                stage.timestamp {
                  source = "entry_ts"
                  format = "RFC3339"
                }

                // Drop high-volume / low-signal entry types
                // Note: attachment is excluded here — hook_permission_decision attachments are
                // selectively kept below; all other attachment subtypes are dropped there.
                stage.drop {
                  source     = "entry_type"
                  expression = "^(user|last-prompt|file-history-snapshot)$"
                }

                // Drop lines that exceed Loki's hard limit (256KB) — assistant entries
                // can include full tool-result payloads that run to MB; these would fail
                // ingestion anyway and are not useful for log analysis.
                stage.drop {
                  longer_than = "256KB"
                }

                // Promote common fields to labels
                stage.labels {
                  values = {
                    type    = "entry_type",
                    version = "",
                  }
                }

                // assistant entries: model, stop reason, and error metadata
                stage.match {
                  selector = `{type="assistant"}`

                  stage.json {
                    expressions = {
                      model        = "message.model",
                      stop_reason  = "message.stop_reason",
                      is_api_error = "isApiErrorMessage",
                      error        = "error",
                    }
                  }
                  stage.labels {
                    values = {
                      model        = "",
                      stop_reason  = "",
                      is_api_error = "",
                      error        = "",
                    }
                  }
                }

                // permission-mode entries
                stage.match {
                  selector = `{type="permission-mode"}`

                  stage.json {
                    expressions = {
                      permission_mode = "permission_mode",
                    }
                  }
                  stage.labels {
                    values = {
                      permission_mode = "",
                    }
                  }
                }

                // pr-link entries (JSON field is camelCase prUrl)
                stage.match {
                  selector = `{type="pr-link"}`

                  stage.json {
                    expressions = {
                      pr_url = "prUrl",
                    }
                  }
                  stage.labels {
                    values = {
                      pr_url = "",
                    }
                  }
                }

                // agent-name entries (JSON field is camelCase agentName)
                stage.match {
                  selector = `{type="agent-name"}`

                  stage.json {
                    expressions = {
                      agent_name = "agentName",
                    }
                  }
                  stage.labels {
                    values = {
                      agent_name = "",
                    }
                  }
                }

                // queue-operation entries (JSON field is "operation", no queue_size in practice)
                stage.match {
                  selector = `{type="queue-operation"}`

                  stage.json {
                    expressions = {
                      operation = "operation",
                    }
                  }
                  stage.labels {
                    values = {
                      operation = "",
                    }
                  }
                }

                // custom-title entries (JSON field is camelCase customTitle)
                stage.match {
                  selector = `{type="custom-title"}`

                  stage.json {
                    expressions = {
                      title = "customTitle",
                    }
                  }
                  stage.labels {
                    values = {
                      title = "",
                    }
                  }
                }

                // attachment entries: extract subtype as a label so we can
                // selectively drop non-permission entries in the next stage
                stage.match {
                  selector = `{type="attachment"}`

                  stage.json {
                    expressions = {
                      attachment_type = "attachment.type",
                    }
                  }

                  stage.labels {
                    values = {
                      attachment_type = "",
                    }
                  }
                }

                // drop attachment subtypes we don't care about; keep:
                //   hook_permission_decision  – tool permission decisions
                //   hook_blocking_error       – invariant violations (rare, high signal)
                //   hook_non_blocking_error   – hook health failures
                stage.match {
                  selector = `{type="attachment", attachment_type!~"hook_permission_decision|hook_blocking_error|hook_non_blocking_error"}`
                  action   = "drop"
                }

                // permission-decision attachments: extract the decision label
                stage.match {
                  selector = `{type="attachment", attachment_type="hook_permission_decision"}`

                  stage.json {
                    expressions = {
                      permission_decision = "attachment.decision",
                    }
                  }

                  stage.labels {
                    values = {
                      permission_decision = "",
                    }
                  }
                }

                // hook error attachments (blocking and non-blocking): extract hook name
                stage.match {
                  selector = `{type="attachment", attachment_type=~"hook_blocking_error|hook_non_blocking_error"}`

                  stage.json {
                    expressions = {
                      hook_name  = "attachment.hookName",
                      hook_event = "attachment.hookEvent",
                    }
                  }

                  stage.labels {
                    values = {
                      hook_name  = "",
                      hook_event = "",
                    }
                  }
                }

                forward_to = [loki.write.local.receiver]
              }

              loki.write "local" {
                endpoint {
                  url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
                }
              }
        serviceMonitor:
          enabled: false
        rbac:
          create: true
        serviceAccount:
          create: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
