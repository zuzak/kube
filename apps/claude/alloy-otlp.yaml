apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-otlp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/description: |
      Grafana Alloy on the Pi receiving OTLP telemetry from Claude Code and
      forwarding metrics to the claude-namespace Prometheus via remote_write.
      Also ingests Claude Code JSONL transcripts from /home/claude/.claude/projects/
      into Loki with type-based label extraction. Deployed as a single-replica
      Deployment pinned to the Pi (hostPort 4317 is safe there; saraneth has no
      Claude Code processes). Separate from the cluster-wide log-collection Alloy
      DaemonSet.
spec:
  project: claude
  destination:
    server: https://kubernetes.default.svc
    namespace: claude
  source:
    repoURL: https://github.com/grafana/alloy.git
    path: operations/helm/charts/alloy
    targetRevision: HEAD
    helm:
      valuesObject:
        crds:
          create: false
        controller:
          type: deployment
          replicas: 1
          priorityClassName: cluster-low
          nodeSelector:
            kubernetes.io/hostname: pi.home.arpa
          volumes:
            extra:
              - name: home-claude
                hostPath:
                  path: /home/claude/.claude/projects
                  type: Directory
        alloy:
          clustering:
            enabled: false
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              hostPort: 4317
              protocol: TCP
          mounts:
            extra:
              - name: home-claude
                mountPath: /home/claude/.claude/projects
                readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          configMap:
            create: true
            content: |
              logging {
                level  = "info"
                format = "logfmt"
              }

              otelcol.receiver.otlp "claude" {
                grpc {
                  endpoint = "0.0.0.0:4317"
                }
                output {
                  metrics = [otelcol.exporter.prometheus.claude.input]
                }
              }

              otelcol.exporter.prometheus "claude" {
                forward_to = [prometheus.remote_write.claude.receiver]
              }

              prometheus.remote_write "claude" {
                endpoint {
                  url = "http://prometheus-claude.claude.svc.cluster.local:9090/api/v1/write"
                }
              }

              // --- Claude Code JSONL transcript ingestion ---

              local.file_match "claude_transcripts" {
                path_targets = [{
                  __path__ = "/home/claude/.claude/projects/**/*.jsonl",
                  job      = "claude-transcripts",
                }]
              }

              loki.source.file "claude_transcripts" {
                targets    = local.file_match.claude_transcripts.targets
                forward_to = [loki.relabel.claude_transcripts.receiver]
              }

              // Extract session UUID from the filename; all JSONL files are named <uuid>.jsonl
              loki.relabel "claude_transcripts" {
                forward_to = [loki.process.claude_transcripts.receiver]

                rule {
                  source_labels = ["filename"]
                  regex         = `.*/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\.jsonl$`
                  target_label  = "session_id"
                  replacement   = "$1"
                }
              }

              loki.process "claude_transcripts" {
                // Extract type first so the drop stage can filter on it
                stage.json {
                  expressions = {
                    entry_type = "type",
                    version    = "version",
                  }
                }

                // Drop high-volume / low-signal entry types
                stage.drop {
                  source     = "entry_type"
                  expression = "^(user|last-prompt|attachment|file-history-snapshot)$"
                }

                // Promote common fields to labels
                stage.labels {
                  values = {
                    type    = "entry_type",
                    version = "",
                  }
                }

                // assistant entries: model, stop reason, and error metadata
                stage.match {
                  selector = `{type="assistant"}`

                  stage.json {
                    expressions = {
                      model        = "message.model",
                      stop_reason  = "message.stop_reason",
                      is_api_error = "isApiErrorMessage",
                      error        = "error",
                    }
                  }
                  stage.labels {
                    values = {
                      model        = "",
                      stop_reason  = "",
                      is_api_error = "",
                      error        = "",
                    }
                  }
                }

                // permission-mode entries
                stage.match {
                  selector = `{type="permission-mode"}`

                  stage.json {
                    expressions = {
                      permission_mode = "permission_mode",
                    }
                  }
                  stage.labels {
                    values = {
                      permission_mode = "",
                    }
                  }
                }

                // pr-link entries (JSON field is camelCase prUrl)
                stage.match {
                  selector = `{type="pr-link"}`

                  stage.json {
                    expressions = {
                      pr_url = "prUrl",
                    }
                  }
                  stage.labels {
                    values = {
                      pr_url = "",
                    }
                  }
                }

                // agent-name entries (JSON field is camelCase agentName)
                stage.match {
                  selector = `{type="agent-name"}`

                  stage.json {
                    expressions = {
                      agent_name = "agentName",
                    }
                  }
                  stage.labels {
                    values = {
                      agent_name = "",
                    }
                  }
                }

                // queue-operation entries (JSON field is "operation", no queue_size in practice)
                stage.match {
                  selector = `{type="queue-operation"}`

                  stage.json {
                    expressions = {
                      operation = "operation",
                    }
                  }
                  stage.labels {
                    values = {
                      operation = "",
                    }
                  }
                }

                // custom-title entries (JSON field is camelCase customTitle)
                stage.match {
                  selector = `{type="custom-title"}`

                  stage.json {
                    expressions = {
                      title = "customTitle",
                    }
                  }
                  stage.labels {
                    values = {
                      title = "",
                    }
                  }
                }

                forward_to = [loki.write.local.receiver]
              }

              loki.write "local" {
                endpoint {
                  url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
                }
              }
        serviceMonitor:
          enabled: false
        rbac:
          create: true
        serviceAccount:
          create: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
