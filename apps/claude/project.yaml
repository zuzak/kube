apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: claude
  namespace: argocd
spec:
  description: Claude Code cluster access and integrations
  destinations:
    - namespace: claude
      server: https://kubernetes.default.svc
    - namespace: 'claude-*'
      server: https://kubernetes.default.svc
  sourceRepos:
    - https://github.com/zuzak/kube.git
    - https://github.com/pab1it0/prometheus-mcp-server.git
    - https://github.com/zuzak/router-mcp
    - https://github.com/grafana/alloy.git
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
