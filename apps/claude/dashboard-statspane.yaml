apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-claude-statspane
  namespace: grafana
  labels:
    grafana_dashboard: "1"
    grafana_folder: "Claude"
data:
  claude-statspane.json: |
    {
      "title": "Claude Live Session",
      "uid": "claude-statspane",
      "schemaVersion": 38,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "gauge",
          "title": "5h Rate Limit",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 6 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "minVizWidth": 75,
            "minVizHeight": 75,
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "blue", "value": 37 },
                  { "color": "orange", "value": 63 },
                  { "color": "red", "value": 90 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_rl_5h_pct",
              "legendFormat": "5h used"
            }
          ]
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "5h Window Elapsed",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 6 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_rl_5h_time_pct",
              "legendFormat": "5h elapsed"
            }
          ]
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "7d Rate Limit",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 6 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "blue", "value": 37 },
                  { "color": "orange", "value": 63 },
                  { "color": "red", "value": 90 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_rl_7d_pct",
              "legendFormat": "7d used"
            }
          ]
        },
        {
          "id": 4,
          "type": "gauge",
          "title": "Context Window",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 6 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_ctx_pct",
              "legendFormat": "ctx"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "5h Rate Limit Trend",
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 6 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_rl_5h_pct",
              "legendFormat": "used %"
            },
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_rl_5h_time_pct",
              "legendFormat": "elapsed %"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Consumption Rate (per 15m)",
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 6 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 5 }
                ]
              },
              "custom": {
                "thresholdsStyle": { "mode": "line" }
              }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_rl_trend_rate_per_15m",
              "legendFormat": "rate/15m"
            }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Session Cost",
          "gridPos": { "x": 0, "y": 12, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_cost_usd",
              "legendFormat": "cost"
            }
          ]
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Active Sessions",
          "gridPos": { "x": 6, "y": 12, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_session_count",
              "legendFormat": "sessions"
            }
          ]
        },
        {
          "id": 9,
          "type": "stat",
          "title": "5h Resets In",
          "gridPos": { "x": 12, "y": 12, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 1800 },
                  { "color": "green", "value": 7200 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_rl_5h_resets_in_secs",
              "legendFormat": "resets in"
            }
          ]
        },
        {
          "id": 10,
          "type": "stat",
          "title": "7d Resets In",
          "gridPos": { "x": 18, "y": 12, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 86400 },
                  { "color": "green", "value": 259200 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "uid": "claude-prometheus" },
              "expr": "claude_rl_7d_resets_in_secs",
              "legendFormat": "resets in"
            }
          ]
        }
      ]
    }
