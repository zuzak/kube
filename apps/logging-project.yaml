apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: logging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  destinations:
    - namespace: loki
      server: https://kubernetes.default.svc
    - namespace: alloy
      server: https://kubernetes.default.svc
    - namespace: grafana
      server: https://kubernetes.default.svc
  sourceRepos:
    - '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
