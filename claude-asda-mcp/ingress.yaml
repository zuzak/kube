apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asda-mcp
  namespace: claude-asda-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: asda.mcp.k3s.fluv.net
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: asda-mcp
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: asda-mcp
                port:
                  name: http
  tls:
    - hosts:
        - asda.mcp.k3s.fluv.net
      secretName: asda-mcp-k3s-fluv-net-tls
