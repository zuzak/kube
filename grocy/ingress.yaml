apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grocy
  namespace: grocy
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - grocy
  rules:
    - host: grocy
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grocy
                port:
                  number: 80
