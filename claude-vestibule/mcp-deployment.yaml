apiVersion: apps/v1
kind: Deployment
metadata:
  name: vestibule-mcp
  namespace: claude-vestibule
  annotations:
    # Depends on vestibule being Ready — see vestibule deployment.
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Single replica. FastMCP is configured stateless_http=True so this is
  # not a hard session-state requirement, but every MCP deployment in
  # this cluster is single-replica and the startup manifest fetch makes
  # parallel replicas pointless.
  replicas: 1
  selector:
    matchLabels:
      app: vestibule-mcp
  template:
    metadata:
      labels:
        app: vestibule-mcp
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - pi.home.arpa
      containers:
        - name: vestibule-mcp
          image: ghcr.io/zuzak/vestibule-mcp:main
          imagePullPolicy: Always
          env:
            - name: VESTIBULE_URL
              value: http://vestibule.claude-vestibule.svc.cluster.local:8080
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            # The MCP blocks startup on the manifest fetch (plus a few
            # retry attempts if vestibule isn't ready yet). Give it
            # headroom before declaring it unhealthy.
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
