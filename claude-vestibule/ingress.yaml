apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vestibule
  namespace: claude-vestibule
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/whitelist-source-range: "160.79.104.0/21"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: vestibule.mcp.k3s.fluv.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vestibule
                port:
                  name: http
  tls:
    - hosts:
        - vestibule.mcp.k3s.fluv.net
      secretName: vestibule-mcp-k3s-fluv-net-tls
